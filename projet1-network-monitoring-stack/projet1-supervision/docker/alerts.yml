groups:
  - name: network_alerts
    rules:

      - alert: HostDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Hôte inaccessible : {{ $labels.instance }}"
          description: "L'hôte {{ $labels.instance }} ne répond plus depuis plus d'1 minute."

      - alert: HighICMPLatency
        expr: probe_duration_seconds{job="blackbox-icmp"} > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Latence élevée vers {{ $labels.instance }}"
          description: "Latence ICMP > 100ms vers {{ $labels.instance }} depuis 5 minutes (actuel : {{ $value | humanizeDuration }})."

      - alert: ServiceDown
        expr: probe_success{job="blackbox-http"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Service HTTP indisponible : {{ $labels.instance }}"
          description: "Le service {{ $labels.instance }} ne répond plus depuis 2 minutes."

      - alert: HighDiskUsage
        expr: (node_filesystem_avail_bytes / node_filesystem_size_bytes) * 100 < 15
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Espace disque faible sur {{ $labels.instance }}"
          description: "Moins de 15% d'espace disponible sur {{ $labels.mountpoint }} ({{ $labels.instance }})."

      - alert: HighInterfaceErrors
        expr: rate(ifInErrors[5m]) + rate(ifOutErrors[5m]) > 0.01
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Erreurs réseau détectées sur {{ $labels.instance }}"
          description: "Taux d'erreurs réseau > 1% sur l'interface {{ $labels.ifDescr }}."

      - alert: HighCPULoad
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Charge CPU élevée sur {{ $labels.instance }}"
          description: "CPU > 85% depuis 10 minutes sur {{ $labels.instance }} (actuel : {{ $value | humanize }}%)."
