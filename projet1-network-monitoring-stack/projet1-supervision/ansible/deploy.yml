---
# =============================================================
# Playbook principal — Déploiement de la stack de supervision
# Usage : ansible-playbook -i inventory.ini deploy.yml
# =============================================================

- name: Déploiement de la stack de supervision réseau
  hosts: monitoring_server
  become: true
  gather_facts: true

  vars_files:
    - vars/vault.yml

  pre_tasks:
    - name: Mise à jour du cache APT
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Installation des dépendances système
      apt:
        name:
          - docker.io
          - docker-compose
          - python3-pip
          - curl
          - git
        state: present

    - name: Démarrage et activation de Docker
      systemd:
        name: docker
        state: started
        enabled: true

  roles:
    - role: prometheus
      tags: prometheus

    - role: grafana
      tags: grafana

    - role: alertmanager
      tags: alertmanager

  post_tasks:
    - name: Vérification que Prometheus est accessible
      uri:
        url: "http://localhost:9090/-/healthy"
        status_code: 200
      retries: 5
      delay: 5

    - name: Vérification que Grafana est accessible
      uri:
        url: "http://localhost:3000/api/health"
        status_code: 200
      retries: 5
      delay: 5

    - name: Résumé du déploiement
      debug:
        msg:
          - "✅ Stack de supervision déployée avec succès"
          - "📊 Grafana     : http://{{ ansible_host }}:3000"
          - "🔍 Prometheus  : http://{{ ansible_host }}:9090"
          - "🔔 Alertmanager: http://{{ ansible_host }}:9093"
